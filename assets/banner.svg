<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" fill="none" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f9bea"/>
      <stop offset="0.6" stop-color="#6fc4ff"/>
      <stop offset="1" stop-color="#cdeeff"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67d0ea"/>
      <stop offset="0.25" stop-color="#2c9ad0"/>
      <stop offset="0.6" stop-color="#1574ad"/>
      <stop offset="1" stop-color="#06223f"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffbe6"/>
      <stop offset="0.4" stop-color="#fff3b0" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff3b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffadc" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#fffadc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a0"/>
      <stop offset="1" stop-color="#caa23a"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="150" fill="url(#sky)"/>
  <circle cx="980" cy="70" r="120" fill="url(#sun)"/>
  <circle cx="980" cy="70" r="34" fill="#fffbe6"/>
  <!-- clouds -->
  <g fill="#ffffff" opacity="0.92">
    <ellipse cx="220" cy="50" rx="42" ry="20"/>
    <ellipse cx="260" cy="56" rx="34" ry="16"/>
    <ellipse cx="185" cy="58" rx="28" ry="13"/>
    <ellipse cx="640" cy="38" rx="36" ry="16"/>
    <ellipse cx="680" cy="44" rx="28" ry="13"/>
  </g>

  <!-- water -->
  <rect y="150" width="1200" height="190" fill="url(#water)"/>
  <!-- sun rays -->
  <g>
    <polygon points="120,150 170,340 210,340 150,150" fill="url(#ray)"/>
    <polygon points="300,150 360,340 405,340 335,150" fill="url(#ray)"/>
    <polygon points="520,150 590,340 640,340 560,150" fill="url(#ray)"/>
    <polygon points="900,150 970,340 1020,340 945,150" fill="url(#ray)"/>
  </g>
  <!-- wave line -->
  <path d="M0,152 Q60,146 120,152 T240,152 T360,152 T480,152 T600,152 T720,152 T840,152 T960,152 T1080,152 T1200,152"
        stroke="#ffffff" stroke-opacity="0.55" stroke-width="3" fill="none"/>

  <!-- dock + rod (left) -->
  <g>
    <rect x="0" y="120" width="150" height="22" fill="#c08a4e"/>
    <rect x="0" y="138" width="150" height="5" fill="#7c5328"/>
    <rect x="40" y="142" width="12" height="40" fill="#6e4423"/>
    <rect x="110" y="142" width="12" height="40" fill="#6e4423"/>
    <!-- rod -->
    <path d="M30,120 Q120,96 175,150" stroke="#6a3f1d" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M30,120 Q120,96 175,150" stroke="#9c6634" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="126" r="8" fill="#1f2a36"/>
    <!-- line + hook -->
    <path d="M175,150 Q210,180 205,230" stroke="#ffffff" stroke-opacity="0.8" stroke-width="1.6" fill="none"/>
    <path d="M205,230 a4,4 0 1 0 6,3" stroke="#e8edf2" stroke-width="2.2" fill="none"/>
  </g>

  <!-- fish silhouettes -->
  <!-- common small -->
  <g transform="translate(430,210)" fill="#9fb8c4">
    <ellipse cx="0" cy="0" rx="22" ry="9"/>
    <polygon points="-18,0 -34,-10 -34,10"/>
    <circle cx="12" cy="-2" r="2.4" fill="#13202e"/>
  </g>
  <g transform="translate(560,250)" fill="#bcc6cc">
    <ellipse cx="0" cy="0" rx="16" ry="6"/>
    <polygon points="-13,0 -24,-7 -24,7"/>
  </g>
  <!-- rare blue -->
  <g transform="translate(700,200)" fill="#1f6cff">
    <ellipse cx="0" cy="0" rx="30" ry="13"/>
    <polygon points="-26,0 -44,-14 -44,14" fill="#ffd54a"/>
    <circle cx="18" cy="-3" r="3" fill="#06122e"/>
  </g>
  <!-- legendary marlin -->
  <g transform="translate(900,260)" fill="#22416b">
    <ellipse cx="0" cy="0" rx="60" ry="16"/>
    <polygon points="-50,0 -78,-20 -78,20"/>
    <rect x="55" y="-4" width="55" height="6" rx="3" fill="#22416b"/>
    <polygon points="0,-14 -10,-46 -28,-14" fill="#1d4f8a"/>
    <circle cx="38" cy="-4" r="3.4" fill="#fff"/>
    <circle cx="39" cy="-4" r="1.8" fill="#06122e"/>
  </g>
  <!-- mythic diamond glow -->
  <g transform="translate(1070,210)">
    <circle r="46" fill="#7fd3ff" opacity="0.18"/>
    <polygon points="34,0 14,-26 -22,-18 -30,0 -22,18 14,26" fill="#bfeaff" opacity="0.92" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="20" cy="-4" r="3" fill="#fff"/>
  </g>

  <!-- bubbles -->
  <g fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.4">
    <circle cx="350" cy="300" r="5"/>
    <circle cx="620" cy="310" r="3"/>
    <circle cx="820" cy="300" r="6"/>
    <circle cx="1010" cy="305" r="4"/>
  </g>

  <!-- title -->
  <text x="600" y="120" text-anchor="middle" font-size="92" font-weight="800" fill="#ffffff" stroke="#0c4d80" stroke-width="2">NeFish</text>
  <text x="600" y="120" text-anchor="middle" font-size="92" font-weight="800" fill="url(#gold)" opacity="0.0">NeFish</text>
  <text x="600" y="162" text-anchor="middle" font-size="24" font-weight="600" fill="#eaf6ff">Океанский симулятор рыбалки в браузере</text>
</svg>
